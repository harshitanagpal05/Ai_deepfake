# ═══════════════════════════════════════════════════════════════
# DeepScan Frontend — Nginx Configuration
# Optimized for serving a React SPA in production
# ═══════════════════════════════════════════════════════════════

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ── Gzip Compression ──────────────────────────────────────
    # Compresses responses on the fly — reduces transfer size ~70%
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        application/json
        application/javascript
        text/xml
        application/xml
        application/xml+rss
        image/svg+xml;
    gzip_min_length 256;

    # ── SPA Routing ───────────────────────────────────────────
    # React Router uses client-side routing. Any URL that doesn't
    # match a real file must fall back to index.html so React
    # can handle the route on the client.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Static Asset Caching ──────────────────────────────────
    # CRA generates hashed filenames (e.g., main.a1b2c3.js)
    # so we can cache aggressively — the hash changes on rebuild.
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ── Health Check Endpoint ─────────────────────────────────
    # Used by Docker HEALTHCHECK and load balancers
    location = /health {
        access_log off;
        return 200 'ok';
        add_header Content-Type text/plain;
    }

    # ── Security Headers ──────────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
}
